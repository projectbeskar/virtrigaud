# S3-staged cross-hypervisor migration (ADR-0006).
#
# SURFACE ONLY — NOT YET FUNCTIONAL. As of ADR-0006 Slice 0 the S3 storage
# backend exists in the CRD/proto/capability surface but has NO transfer logic.
# A migration with `storage.type: s3` is rejected at the Validating phase with:
#
#   storage backend "s3" is not yet implemented; only "pvc" is supported today
#   (ADR-0006 Slice 0)
#
# This example documents the intended shape so it is review-stable as the
# transfer slices land. For a working migration today, use `storage.type: pvc`
# (see vmmigration-basic.yaml / vmmigration-advanced.yaml).

apiVersion: infra.virtrigaud.io/v1beta1
kind: VMMigration
metadata:
  name: migration-s3-example
  namespace: default
  labels:
    app: my-app
    environment: production
spec:
  source:
    vmRef:
      name: prod-app-server
    createSnapshot: false
    deleteAfterMigration: false

  target:
    name: prod-app-server-migrated
    providerRef:
      name: target-provider
      namespace: default
    classRef:
      name: high-performance
    networks:
      - name: production-network

  # S3-compatible object storage staging (AWS S3, MinIO, Ceph RGW).
  # Credentials are ALWAYS referenced via a Secret — never inline.
  storage:
    type: s3
    transferMode: auto        # auto | relay | direct
    s3:
      bucket: virtrigaud-migrations
      # endpoint: https://minio.example.com   # set for MinIO/Ceph RGW; omit for AWS
      region: eu-central-1
      prefix: prod-app-server/
      usePathStyle: false     # set true for most non-AWS S3 (MinIO/RGW)
      credentialsSecretRef:
        name: s3-migration-credentials

  options:
    diskFormat: qcow2
    compress: false
    verifyChecksums: true
    timeout: "6h"

  metadata:
    purpose: "provider-change"
    project: "cloud-migration-2026"
    createdBy: "platform-team"
