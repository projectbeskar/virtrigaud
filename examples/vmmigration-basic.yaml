# Basic VM Migration Example
# Migrates a VM from one provider to another with minimal configuration.
#
# NOTE: this example uses the legacy PVC-backed storage path (compat-only).
# The recommended, validated path is S3/relay across all three providers in any
# direction — see vmmigration-s3.yaml and vmmigration-proxmox-s3.yaml. PVC does
# NOT work for Proxmox or for host-resident libvirt disks.

apiVersion: infra.virtrigaud.io/v1beta1
kind: VMMigration
metadata:
  name: basic-migration
  namespace: default
spec:
  # Source VM to migrate
  source:
    vmRef:
      name: my-source-vm
    createSnapshot: true

  # Target configuration
  target:
    name: my-target-vm
    providerRef:
      name: target-provider
      namespace: virtrigaud-system
    classRef:
      name: standard-vm
    networks:
      - name: default

  # PVC-backed intermediate storage (only supported type in v0.3.6).
  # Requires a ReadWriteMany StorageClass (NFS, CephFS, etc.).
  storage:
    type: pvc
    pvc:
      storageClassName: nfs-migration-storage
      size: 100Gi
      accessMode: ReadWriteMany

  # Migration options with sensible defaults
  options:
    diskFormat: qcow2
    compress: false
    verifyChecksums: true

