---
name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: projectbeskar/virtrigaud

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet (excluding libvirt)
        run: |
          # Use go list to find all packages and exclude problematic ones
          go list ./... | grep -v '/internal/providers/libvirt' | grep -v '/cmd/provider-libvirt' | grep -v '/test/integration' | xargs go vet

      - name: Run tests (excluding libvirt)
        run: |
          # Use the Makefile target which properly sets up ENVTEST environment
          make test
          # The Makefile generates coverage in cover.out, rename it for codecov
          mv cover.out coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvirt dependencies for Go module resolution
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.12.2
          args: --timeout=10m

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run Gosec Security Scanner (excluding libvirt)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

          # Run gosec with timeout and better error handling
          # Exclude vendor, modules, and problematic dependencies
          timeout 300s $(go env GOPATH)/bin/gosec \
            -fmt sarif \
            -out gosec.sarif \
            -exclude-dir=internal/providers/libvirt \
            -exclude-dir=test/integration \
            -exclude-dir=vendor \
            -exclude-dir=$(go env GOPATH)/pkg/mod \
            -exclude=G104,G204,G304 \
            ./... || {

            echo "🔍 Gosec completed with issues or timeout. Checking results..."

            # Check if SARIF file was created
            if [ -f gosec.sarif ]; then
              echo "✅ SARIF file created. Checking for critical issues..."

              # Count critical/high severity issues
              CRITICAL_COUNT=$(grep -o '"level":"error"' gosec.sarif | wc -l || echo "0")
              HIGH_COUNT=$(grep -o '"level":"warning"' gosec.sarif | wc -l || echo "0")

              echo "📊 Security scan results:"
              echo "   - Critical issues: $CRITICAL_COUNT"
              echo "   - High issues: $HIGH_COUNT"

              # Only fail on critical issues
              if [ "$CRITICAL_COUNT" -gt 0 ]; then
                echo "❌ Critical security issues found"
                exit 1
              else
                echo "✅ No critical security issues found"
                exit 0
              fi
            else
              echo "❌ SARIF file not created - gosec failed to complete"
              exit 1
            fi
          }

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: gosec.sarif

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: 'trivy-results.sarif'

  govulncheck:
    name: Supply Chain Vulnerability Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      # K4 / #102: pin to v4 here for the same reason as the build matrix job —
      # actions/checkout@v6.0.2 intermittently fails on PR merge refs with
      # "Duplicate header: Authorization" / HTTP 400. DO NOT bump to v6 without
      # resolving #102 first.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4 (pinned for #102)

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (root module)
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Run govulncheck (sdk module)
        run: cd sdk && $(go env GOPATH)/bin/govulncheck ./...

  generate:
    name: Verify Generated Files
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.17.2

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate code
        run: make generate

      - name: Generate CRDs
        run: make gen-crds

      - name: Generate protobuf
        run: make proto

      - name: Verify no changes
        run: |
          # Reset go.mod changes caused by go mod tidy in CI
          git checkout HEAD -- go.mod go.sum 2>/dev/null || true

          # Check for other generated file changes
          git diff --exit-code || (echo "Generated files are out of sync. Please run 'make generate && make manifests && make proto' and commit the changes." && exit 1)

  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [test, lint]
    strategy:
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox]
    steps:
      # K4 / #102: this matrix job is intermittently failing on
      # actions/checkout@v6.0.2 with "fatal: could not read Username for
      # https://github.com" during the fetch of pull/<N>/merge or post-merge
      # SHA. The same v6.0.2 works fine in the test, lint, security, and
      # build-images jobs in this same workflow. Pinning back to v4 here
      # while we investigate. DO NOT bump this specific entry to v6 without
      # resolving #102 first.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4 (pinned for #102)

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvirt (for provider-libvirt)
        if: matrix.component == 'provider-libvirt'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config

      - name: Build binary
        run: |
          case "${{ matrix.component }}" in
            manager)
              CGO_ENABLED=0 go build -o bin/manager ./cmd/manager
              ;;
            provider-libvirt)
              CGO_ENABLED=1 go build -o bin/provider-libvirt ./cmd/provider-libvirt
              ;;
            provider-vsphere)
              CGO_ENABLED=0 go build -o bin/provider-vsphere ./cmd/provider-vsphere
              ;;
            provider-proxmox)
              CGO_ENABLED=0 go build -o bin/provider-proxmox ./cmd/provider-proxmox
              ;;
          esac

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.component }}-binary
          path: bin/${{ matrix.component }}*

  build-tools:
    name: Build Tools
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI tools
        run: |
          go build -o bin/vrtg ./cmd/vrtg
          go build -o bin/vcts ./cmd/vcts
          go build -o bin/virtrigaud-loadgen ./cmd/virtrigaud-loadgen
          go build -o bin/vrtg-provider ./cmd/vrtg-provider

      - name: Upload tools
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-tools
          path: bin/*

  # Stage 1: build each component for each architecture on a NATIVE runner and
  # push by digest (not by tag). arm64 builds on a native ubuntu-24.04-arm
  # runner instead of QEMU emulation — the emulated arm64 libvirt (CGO) build
  # exceeded the 30m job timeout and cancelled the whole run (see #165).
  build-images:
    name: Build Container Images
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: [test, lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # No QEMU: each leg builds a single NATIVE architecture on its own runner.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ${{ matrix.component == 'manager' && './build/Dockerfile.manager' || format('./cmd/{0}/Dockerfile', matrix.component) }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest still needs the repository NAME so buildx knows where
          # to push the digest (the tag itself is applied later in merge-images).
          # Omitting name= fails with "tag is needed when pushing to registry".
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          # Disable GitHub Actions cache due to reliability issues
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stage 2: merge the per-arch digests for each component into a single
  # multi-arch manifest published under the dev tags (:main, :main-<sha>,
  # :latest). Tag scheme is identical to the previous single-job build.
  merge-images:
    name: Merge Container Image Manifests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox]
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi-arch manifest from digests
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ steps.meta.outputs.version }}"

  helm:
    name: Validate Helm Charts
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: 'v3.12.0'

      - name: Validate Helm charts
        run: |
          helm lint charts/virtrigaud

      - name: Validate rendered manifests
        run: |
          # Render Helm template (without cluster validation)
          helm template virtrigaud charts/virtrigaud --values charts/virtrigaud/values.yaml > /tmp/rendered.yaml

          # Basic YAML validation - check if it's valid YAML
          echo "Validating YAML syntax..."
          python3 -c "
          import yaml, sys
          try:
              with open('/tmp/rendered.yaml', 'r') as f:
                  yaml.safe_load_all(f)
              print('✅ YAML syntax validation passed')
          except yaml.YAMLError as e:
              print(f'❌ YAML syntax error: {e}')
              sys.exit(1)
          "

          # Check for basic Kubernetes resource structure
          echo "Checking for basic Kubernetes resource structure..."
          grep -E "(apiVersion|kind|metadata)" /tmp/rendered.yaml > /dev/null && echo "✅ Basic Kubernetes structure found" || echo "⚠️  No Kubernetes resources found"

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [build-tools]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download CLI tools
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cli-tools
          path: bin/

      - name: Make tools executable
        run: chmod +x bin/*

      - name: Validate conformance specs
        run: ./bin/vcts validate test/conformance/specs/

      - name: Upload conformance results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: conformance-validation
          path: test/conformance/specs/

  integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # NOTE: `test/integration/observability_test.go` is pure cross-package
      # wiring (internal/obs/{logging,metrics,health} + resilience + contracts)
      # and has no Kubernetes API or libvirt dependency. We deliberately skip
      # Kind + CRD setup here to keep this job fast (saves ~60s/run). When a
      # future integration test under test/integration/ requires a cluster
      # (e.g. re-enabling vm_lifecycle_test.go.disabled), add Kind setup back
      # behind a path filter or split into a second job.

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run integration tests
        run: make test-integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v5
        with:
          files: ./cover-integration.out
          flags: integration
          name: codecov-integration

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: integration-test-results
          path: test/integration/results/
        continue-on-error: true

  # Consolidated validation jobs (previously separate workflows)
  catalog-validation:
    name: Catalog Validation
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: contains(github.event.head_commit.modified, 'providers/catalog.yaml') || contains(github.event.head_commit.added, 'providers/catalog.yaml')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Validate catalog schema
        run: |
          python -c "
          import yaml
          import jsonschema

          # Define catalog schema
          schema = {
            'type': 'object',
            'properties': {
              'providers': {
                'type': 'array',
                'items': {
                  'type': 'object',
                  'properties': {
                    'name': {'type': 'string'},
                    'displayName': {'type': 'string'},
                    'description': {'type': 'string'},
                    'capabilities': {'type': 'array'},
                    'conformance': {'type': 'object'}
                  },
                  'required': ['name', 'displayName', 'description']
                }
              }
            },
            'required': ['providers']
          }

          # Validate catalog.yaml
          with open('providers/catalog.yaml', 'r') as f:
              data = yaml.safe_load(f)

          jsonschema.validate(data, schema)
          print('✅ Catalog schema validation passed')
          "

  api-conversion-tests:
    name: API Conversion Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: contains(github.event.head_commit.modified, 'api/') || contains(github.event.head_commit.added, 'api/') || contains(github.event.head_commit.modified, 'config/crd/') || contains(github.event.head_commit.added, 'config/crd/')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify single-version CRDs
        run: |
          echo "🔍 Verifying single v1beta1 version in CRDs..."
          ./hack/verify-single-version.sh

      - name: Verify CRD kustomization is in sync
        run: |
          echo "🔍 Verifying every CRD base is referenced in kustomization..."
          ./hack/verify-crd-kustomization.sh

      - name: Verify CRD generation
        run: |
          echo "🔍 Verifying CRD generation..."
          make generate && git diff --exit-code
          git diff --exit-code config/crd/ || (echo "❌ CRDs are out of sync" && exit 1)

  ci:
    name: CI Summary
    runs-on: ubuntu-22.04
    needs: [test, lint, security, govulncheck, generate, build, build-tools, helm, conformance, integration, catalog-validation, api-conversion-tests]
    if: always()
    steps:
      - name: Check CI Results
        run: |
          echo "CI Summary:"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Govulncheck: ${{ needs.govulncheck.result }}"
          echo "- Generate: ${{ needs.generate.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Build Tools: ${{ needs.build-tools.result }}"
          echo "- Helm: ${{ needs.helm.result }}"
          echo "- Conformance: ${{ needs.conformance.result }}"
          echo "- Integration: ${{ needs.integration.result }}"
          echo "- Catalog Validation: ${{ needs.catalog-validation.result }}"
          echo "- API Conversion Tests: ${{ needs.api-conversion-tests.result }}"

          # Fail if any required job failed
          if [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.govulncheck.result }}" != "success" ]] || \
             [[ "${{ needs.generate.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.build-tools.result }}" != "success" ]] || \
             [[ "${{ needs.helm.result }}" != "success" ]] || \
             [[ "${{ needs.conformance.result }}" != "success" ]] || \
             ([[ "${{ needs.catalog-validation.result }}" != "success" ]] && [[ "${{ needs.catalog-validation.result }}" != "skipped" ]]) || \
             ([[ "${{ needs.api-conversion-tests.result }}" != "success" ]] && [[ "${{ needs.api-conversion-tests.result }}" != "skipped" ]]); then
            echo "❌ CI failed"
            exit 1
          fi

          echo "✅ CI passed"
