---
name: Release

"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: projectbeskar/virtrigaud

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
      version: ${{ steps.get-tag.outputs.version }}
    steps:
      - name: Get tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION=${TAG#v}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  # Stage 1: build each release component for each architecture on a NATIVE
  # runner and push BY DIGEST (not by tag). This mirrors the proven
  # `build-images` job in ci.yml (PR-A, #166/#167): arm64 builds on a native
  # ubuntu-24.04-arm runner instead of QEMU emulation, which avoids the
  # libvirt (CGO) emulated-build timeout that cancelled the #164 main run.
  # The release tag(s) are applied later, in `merge-and-sign`.
  build-and-push:
    name: Build and Push Images
    runs-on: ${{ matrix.runner }}
    needs: prepare
    # Kept at 30m (the previous ceiling) to be conservative: each leg now
    # builds a single NATIVE arch (no QEMU), so this is generous headroom —
    # arm64 native is ~minutes per PR-A timings. The nested build step keeps
    # its own 20m guard.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox, kubectl]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # No QEMU: each leg builds a single NATIVE architecture on its own runner.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Wait and retry Docker login
        run: |
          echo "Attempting Docker login with retry logic..."
          for i in {1..3}; do
            echo "Login attempt $i/3"
            if docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}; then
              echo "Login successful on attempt $i"
              break
            else
              echo "Login attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "All login attempts failed"
                exit 1
              fi
              echo "Waiting 30 seconds before retry..."
              sleep 30
            fi
          done

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}

      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          if [ "${{ matrix.component }}" = "manager" ]; then
            echo "path=./build/Dockerfile.manager" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.component }}" = "kubectl" ]; then
            echo "path=./build/Dockerfile.kubectl" >> "$GITHUB_OUTPUT"
          else
            echo "path=./cmd/${{ matrix.component }}/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        timeout-minutes: 20
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # Inject VERSION and GIT_SHA into the binary via ldflags so that
          # internal/version reports accurate values (consumed by
          # virtrigaud_build_info on /metrics). Dockerfiles that do not
          # declare these ARGs ignore them silently.
          build-args: |
            VERSION=${{ needs.prepare.outputs.tag }}
            GIT_SHA=${{ github.sha }}
          # push-by-digest still needs the repository NAME so buildx knows where
          # to push the digest (the tag itself is applied later in
          # merge-and-sign). Omitting name= fails with "tag is needed when
          # pushing to registry" — this exact form is the one fixed in #167.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          # NOTE (multi-arch): provenance/sbom buildx attestations are NOT set
          # here. With push-by-digest they emit extra manifests into the digest
          # set that break `imagetools create` during the merge. Supply-chain
          # SBOMs are produced independently by the `generate-sbom` job (Syft)
          # against the merged manifest tag, and the multi-arch manifest is
          # cosign-signed recursively in `merge-and-sign`.
          # Disable GitHub Actions cache due to reliability issues
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stage 2: merge the per-arch digests for each component into a single
  # multi-arch manifest published under the RELEASE tag scheme (semver +
  # ref/tag — preserved byte-for-byte from the previous single-arch build),
  # then cosign-sign the manifest INDEX recursively so both the index and
  # every per-arch child image are signed.
  merge-and-sign:
    name: Merge Manifests and Sign
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox, kubectl]
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Wait and retry Docker login
        run: |
          echo "Attempting Docker login with retry logic..."
          for i in {1..3}; do
            echo "Login attempt $i/3"
            if docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}; then
              echo "Login successful on attempt $i"
              break
            else
              echo "Login attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "All login attempts failed"
                exit 1
              fi
              echo "Waiting 30 seconds before retry..."
              sleep 30
            fi
          done

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag

      - name: Create multi-arch manifest from digests
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ steps.meta.outputs.version }}"

      - name: Resolve manifest index digest
        id: index
        run: |
          # The multi-arch manifest index digest is identical regardless of
          # which release tag we resolve it through, so we use the primary
          # version tag. Strip the surrounding quotes that {{json}} emits.
          DIGEST=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved index digest: ${DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin a legacy-default cosign (#172): cosign v3.0 flips signing output
          # to the new Sigstore-bundle (OCI 1.1 referrer) format, while
          # slsa-github-generator still writes SLSA provenance to the legacy
          # `.att` tag — so no single cosign version verifies signature + SBOM +
          # SLSA with default flags. v2.6.3 emits legacy `.sig`/`.att` tags that
          # match the SLSA generator, so any cosign >= 2.2 verifies all three.
          cosign-release: 'v2.6.3'

      - name: Sign multi-arch manifest (index + per-arch children)
        run: |
          # --recursive signs the manifest INDEX and every per-arch child
          # image it references, so amd64 and arm64 are both covered. Signing
          # by index digest (not tag) is the immutable, race-free reference.
          cosign sign --yes --recursive \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}@${{ steps.index.outputs.digest }}"

      # Capture the EXACT index digest that cosign just signed so the SLSA
      # provenance generator (see the `provenance` job) attests the byte-
      # identical manifest. Persisting the digest we signed — rather than
      # re-resolving it downstream — removes any chance of the provenance
      # subject drifting from the signed (and SBOM-attested) index. The
      # collect-index-digests fan-in job assembles these per-component files
      # into a component->digest map that the matrix provenance job reads.
      - name: Record signed index digest for provenance
        run: |
          mkdir -p /tmp/index-digest
          # Write "<component> <digest>" so the fan-in job can build a JSON map
          # without needing to know the artifact-name -> component split.
          printf '%s %s\n' \
            "${{ matrix.component }}" \
            "${{ steps.index.outputs.digest }}" \
            > "/tmp/index-digest/${{ matrix.component }}"

      - name: Upload signed index digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: index-digest-${{ matrix.component }}
          path: /tmp/index-digest/${{ matrix.component }}
          if-no-files-found: error
          retention-days: 1

  # Stage 2b (fan-in): collapse the per-component `index-digest-<component>`
  # artifacts produced by the matrix `merge-and-sign` job into a single
  # component -> digest JSON map exposed as a job output. This is the standard
  # way to feed a per-matrix value into a reusable-workflow `uses:` call:
  # matrix-job step outputs do NOT fan out per matrix value to downstream jobs,
  # so the `provenance` matrix job below reads its component's signed index
  # digest out of this map instead. The digests collected here are byte-for-
  # byte the ones `cosign sign --recursive` (and the SBOM `cosign attest`)
  # covered, so signature, SBOM, and provenance all describe the same index.
  collect-index-digests:
    name: Collect Signed Index Digests
    runs-on: ubuntu-latest
    needs: merge-and-sign
    timeout-minutes: 10
    outputs:
      map: ${{ steps.assemble.outputs.map }}
    steps:
      - name: Download all index-digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/index-digests
          pattern: index-digest-*
          merge-multiple: true

      - name: Assemble component -> {image,digest} map
        id: assemble
        env:
          # Build the FULL image reference here, in a step that has the `env`
          # context. The downstream `provenance` job calls a reusable workflow,
          # and the `env` context is NOT available in a reusable-workflow `with:`
          # block (only github/needs/strategy/matrix/inputs/vars are). So the
          # image name must be resolved now and carried through the map; the
          # provenance job then reads it via the `needs` context, which IS
          # allowed in `with:`.
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}
        run: |
          set -euo pipefail
          # Each file is named after its component and contains a single line:
          #   "<component> <sha256:...>"
          # Fold them into a compact JSON object keyed by component name, with
          # value {image, digest} so the provenance matrix job can pass both the
          # generator's `image` and `digest` inputs without needing `env`.
          MAP=$(cat /tmp/index-digests/* \
            | jq -R -s -c --arg base "${IMAGE_BASE}" \
                'split("\n")
                | map(select(length > 0)
                    | split(" ")
                    | {key: .[0], value: {image: ($base + "/" + .[0]), digest: .[1]}})
                | from_entries')
          echo "Assembled index-digest map: ${MAP}"
          echo "map=${MAP}" >> "$GITHUB_OUTPUT"

  # Stage 2c: SLSA Build L3 provenance for the multi-arch index.
  #
  # WHY a separate generator (not buildx provenance: mode=max): the native
  # per-arch + `imagetools create` merge cannot carry a buildx provenance
  # attestation through the digest merge (it would orphan as an unknown/unknown
  # manifest and break the merge — the same constraint that forced the SBOM to
  # be re-attached via cosign). So provenance is generated independently against
  # the already-signed index digest. Together with the recursive cosign sign
  # (merge-and-sign) and the SBOM cosign attest (generate-sbom), this restores
  # FULL attestation parity with the pre-#165 single-arch release (closes #169).
  #
  # The `digest` passed here is the SAME signed index digest captured in
  # merge-and-sign (via collect-index-digests), so the provenance subject is
  # byte-identical to the signed + SBOM-attested manifest.
  provenance:
    name: SLSA Provenance
    needs: collect-index-digests
    # The slsa-github-generator caller job must grant exactly these scopes
    # (per the generator's documented contract for v2.1.0):
    #   id-token: write -> mint the GH OIDC token the generator exchanges with
    #                      Fulcio for a short-lived keyless signing cert.
    #   packages: write -> push the provenance attestation to GHCR.
    #   actions:  read  -> the generator reads this run's workflow metadata to
    #                      embed non-forgeable builder identity in the predicate.
    permissions:
      id-token: write
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox, kubectl]
    # IMPORTANT — DO NOT SHA-PIN THIS REFERENCE.
    # slsa-github-generator reusable workflows MUST be referenced by a semantic
    # version git TAG (e.g. @v2.1.0), never a commit SHA and never a branch. The
    # generator self-verifies its own source against the referenced tag to emit
    # non-forgeable SLSA provenance (it resolves the calling ref via
    # detect-workflow-js); pinning to a SHA breaks that self-verification and the
    # generated provenance is rejected by verifiers. This is the ONE sanctioned
    # exception to this repo's "SHA-pin every action" rule (see CLAUDE.md).
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      # image + digest both come from the fan-in map (via the `needs` context,
      # which IS allowed in a reusable-workflow `with:` block — `env` is not).
      # The generator requires `image` WITHOUT a tag/digest, and `digest` of the
      # form 'sha256:...'. The digest is byte-identical to the one cosign signed
      # in merge-and-sign and the SBOM was attested against in generate-sbom.
      image: ${{ fromJSON(needs.collect-index-digests.outputs.map)[matrix.component].image }}
      digest: ${{ fromJSON(needs.collect-index-digests.outputs.map)[matrix.component].digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan Images
    runs-on: ubuntu-latest
    # Depends on merge-and-sign: the release tag only exists once the per-arch
    # digests are merged into the multi-arch manifest. Trivy scans the tag.
    needs: [prepare, merge-and-sign]
    timeout-minutes: 20
    strategy:
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox, kubectl]
    steps:
      - name: Retry Docker login for security scan
        run: |
          echo "Attempting Docker login for security scan..."
          for i in {1..3}; do
            echo "Login attempt $i/3"
            if docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}; then
              echo "Login successful on attempt $i"
              break
            else
              echo "Login attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "All login attempts failed"
                exit 1
              fi
              echo "Waiting 30 seconds before retry..."
              sleep 30
            fi
          done

      - name: Wait for image propagation
        run: |
          echo "Waiting for image to be available in registry..."
          sleep 30

          # Verify image exists before scanning
          for i in {1..5}; do
            if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }} > /dev/null 2>&1; then
              echo "Image is available"
              break
            fi
            echo "Attempt $i: Image not yet available, waiting..."
            sleep 30
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.component }}.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: 'trivy-results-${{ matrix.component }}.sarif'

      - name: Run Trivy for high/critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }}
          format: 'table'
          # kubectl image uses official K8s binary - don't fail on its vulnerabilities
          exit-code: ${{ matrix.component == 'kubectl' && '0' || '1' }}
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    # Depends on merge-and-sign: the release tag (the multi-arch manifest the
    # SBOM is generated against) only exists after the merge step. This job
    # also attaches the SBOM to the signed index as a keyless cosign
    # attestation (see the "Attest SBOM" step below), so it requires the same
    # OIDC token-minting permission that merge-and-sign uses to sign.
    needs: [prepare, merge-and-sign]
    timeout-minutes: 15
    # The workflow-level `permissions:` block already grants id-token: write,
    # which generate-sbom inherits. We pin the job-level scope explicitly so
    # the keyless-cosign requirement is self-documenting and survives any
    # future tightening of the workflow-level defaults:
    #   id-token: write  -> mint the OIDC token cosign attest exchanges with
    #                       Fulcio for a short-lived signing cert (keyless).
    #   packages: write  -> push the attestation to GHCR alongside the image.
    #   contents: read   -> baseline checkout/read scope.
    permissions:
      id-token: write
      packages: write
      contents: read
    strategy:
      matrix:
        component: [manager, provider-libvirt, provider-vsphere, provider-proxmox, kubectl]
    steps:
      - name: Retry Docker login for SBOM generation
        run: |
          echo "Attempting Docker login for SBOM generation..."
          for i in {1..3}; do
            echo "Login attempt $i/3"
            if docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}; then
              echo "Login successful on attempt $i"
              break
            else
              echo "Login attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "All login attempts failed"
                exit 1
              fi
              echo "Waiting 30 seconds before retry..."
              sleep 30
            fi
          done

      - name: Wait for image propagation
        run: |
          echo "Waiting for image to be available in registry..."
          sleep 30

          # Verify image exists before generating SBOM
          for i in {1..5}; do
            if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }} > /dev/null 2>&1; then
              echo "Image is available"
              break
            fi
            echo "Attempt $i: Image not yet available, waiting..."
            sleep 30
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json
          # This job is intentionally scoped to contents: read (see permissions
          # above). The SBOM is uploaded as a workflow artifact below and then
          # attached to the GitHub Release by the create-release job, so the
          # action's own release upload is redundant — and would fail with
          # "Resource not accessible by integration" since it needs
          # contents: write. Disable it.
          upload-release-assets: false

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ matrix.component }}
          path: sbom-${{ matrix.component }}.spdx.json

      # --- SBOM-as-attestation -------------------------------------------------
      # Restore the supply-chain control the old single-arch release provided
      # via the buildx `sbom: true` setting. That setting cannot be re-added to
      # the build step: with push-by-digest it orphans an `unknown/unknown`
      # manifest into the digest set that breaks `imagetools create` during the
      # merge (the whole reason PR-B switched to native per-arch merge). Instead
      # we attach the Syft SPDX SBOM (already generated above) to the SIGNED
      # multi-arch index as a keyless cosign attestation — same OIDC trust model
      # as the `cosign sign` in merge-and-sign.
      #
      # SLSA *provenance* (the old buildx `provenance: mode=max`) is NOT restored
      # here; that is tracked separately in #169.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin a legacy-default cosign (#172): cosign v3.0 flips signing output
          # to the new Sigstore-bundle (OCI 1.1 referrer) format, while
          # slsa-github-generator still writes SLSA provenance to the legacy
          # `.att` tag — so no single cosign version verifies signature + SBOM +
          # SLSA with default flags. v2.6.3 emits legacy `.sig`/`.att` tags that
          # match the SLSA generator, so any cosign >= 2.2 verifies all three.
          cosign-release: 'v2.6.3'

      - name: Resolve manifest index digest
        id: index
        run: |
          # Resolve the SAME multi-arch index digest that merge-and-sign signed.
          # imagetools resolves the index digest identically regardless of which
          # release tag it is queried through, so we use the release tag. Strip
          # the surrounding quotes that {{json}} emits.
          DIGEST=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}:${{ needs.prepare.outputs.tag }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved index digest: ${DIGEST}"

      - name: Attest SBOM to multi-arch index (keyless)
        run: |
          # Attach the SBOM attestation to the manifest INDEX digest. NOTE:
          # `cosign attest` does NOT support `--recursive` (only `cosign sign`
          # does, and that flag was removed from `attest` in current cosign) —
          # an earlier rc failed with "unknown flag: --recursive". Attesting the
          # index is the correct + verifiable target: `cosign verify-attestation
          # <image>:<tag>` resolves the tag -> index -> this attestation. We
          # attest by index digest (not tag) for an immutable, race-free target.
          # The SBOM predicate is essentially arch-independent (Go module set),
          # so an index-level attestation covers the released artifact; per-arch
          # SBOM attestation would require per-arch Syft scans (future work).
          cosign attest --yes \
            --type spdxjson \
            --predicate "sbom-${{ matrix.component }}.spdx.json" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.component }}@${{ steps.index.outputs.digest }}"

  build-helm-chart:
    name: Build and Package Helm Chart
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: '3.12.0'

      - name: Update chart version
        run: |
          sed -i "s/version: .*/version: ${{ needs.prepare.outputs.version }}/" charts/virtrigaud/Chart.yaml
          sed -i "s/appVersion: .*/appVersion: \"${{ needs.prepare.outputs.tag }}\"/" charts/virtrigaud/Chart.yaml

          # Update VirtRigaud component image tags in values.yaml (but not kubectl image)
          # Update manager image tag (use line range to be precise)
          MANAGER_START=$(grep -n "^manager:" charts/virtrigaud/values.yaml | cut -d: -f1)
          MANAGER_END=$((MANAGER_START + 10))
          sed -i "${MANAGER_START},${MANAGER_END} s/    tag: \".*\"/    tag: \"${{ needs.prepare.outputs.tag }}\"/" charts/virtrigaud/values.yaml
          # Update provider image tags (use line ranges to be precise)
          LIBVIRT_START=$(grep -n "^  libvirt:" charts/virtrigaud/values.yaml | cut -d: -f1)
          LIBVIRT_END=$((LIBVIRT_START + 15))
          sed -i "${LIBVIRT_START},${LIBVIRT_END} s/      tag: \".*\"/      tag: \"${{ needs.prepare.outputs.tag }}\"/" charts/virtrigaud/values.yaml
          VSPHERE_START=$(grep -n "^  vsphere:" charts/virtrigaud/values.yaml | cut -d: -f1)
          VSPHERE_END=$((VSPHERE_START + 15))
          sed -i "${VSPHERE_START},${VSPHERE_END} s/      tag: \".*\"/      tag: \"${{ needs.prepare.outputs.tag }}\"/" charts/virtrigaud/values.yaml
          PROXMOX_START=$(grep -n "^  proxmox:" charts/virtrigaud/values.yaml | cut -d: -f1)
          PROXMOX_END=$((PROXMOX_START + 15))
          sed -i "${PROXMOX_START},${PROXMOX_END} s/      tag: \".*\"/      tag: \"${{ needs.prepare.outputs.tag }}\"/" charts/virtrigaud/values.yaml
          # Update crdUpgrade kubectl image to point to our built image (using line numbers to be precise)
          CRDUPGRADE_START=$(grep -n "^crdUpgrade:" charts/virtrigaud/values.yaml | cut -d: -f1)
          CRDUPGRADE_END=$((CRDUPGRADE_START + 20))
          sed -i "${CRDUPGRADE_START},${CRDUPGRADE_END} { s|repository: ghcr.io/projectbeskar/virtrigaud/kubectl|repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/kubectl|; s/tag: \"v.*\"/tag: \"${{ needs.prepare.outputs.tag }}\"/; }" charts/virtrigaud/values.yaml

      - name: Generate CRDs for Helm chart
        run: |
          # Generate CRDs directly into Helm chart directory
          make gen-helm-crds

      - name: Package chart
        run: |
          mkdir -p helm-packages
          helm package charts/virtrigaud --destination ./helm-packages/

      - name: Upload chart
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: helm-chart
          path: helm-packages/*.tgz

  build-cli-tools:
    name: Build CLI Tools
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 15
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI tools
        run: |
          mkdir -p dist

          # Set extension for Windows
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi

          # Build each tool
          for tool in vrtg vcts virtrigaud-loadgen vrtg-provider; do
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
              -ldflags="-s -w -X 'main.version=${{ needs.prepare.outputs.tag }}'" \
              -o dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}${EXT} \
              ./cmd/${tool}
          done

      - name: Upload CLI tools
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cli-tools-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=version:refname | grep -B1 ${{ needs.prepare.outputs.tag }} | head -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ needs.prepare.outputs.tag }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Generate changelog
          cat > CHANGELOG.md << EOF
          # Changelog for ${{ needs.prepare.outputs.tag }}

          ## What's Changed

          $(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${{ needs.prepare.outputs.tag }} | head -20)

          ## Container Images

          - Manager: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/manager:${{ needs.prepare.outputs.tag }}\`
          - Provider Libvirt: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/provider-libvirt:${{ needs.prepare.outputs.tag }}\`
          - Provider vSphere: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/provider-vsphere:${{ needs.prepare.outputs.tag }}\`
          - Provider Proxmox: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/provider-proxmox:${{ needs.prepare.outputs.tag }}\`
          - Kubectl: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/kubectl:${{ needs.prepare.outputs.tag }}\`

          ## Installation

          \`\`\`bash
          # Note: Helm OCI requires authentication even for public repos
          # In CI/CD, we use GITHUB_TOKEN for authentication
          helm repo add virtrigaud https://projectbeskar.github.io/virtrigaud
          helm install virtrigaud virtrigaud/virtrigaud --version ${{ needs.prepare.outputs.version }}
          \`\`\`

          ## Security

          All images are signed with Cosign and include Software Bill of Materials (SBOMs).

          **Full Changelog**: https://github.com/projectbeskar/virtrigaud/compare/${PREV_TAG}...${{ needs.prepare.outputs.tag }}
          EOF

      - name: Upload changelog
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: changelog
          path: CHANGELOG.md

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # provenance is a v0.3.7 release-blocker (full attestation parity, #169):
    # gate the GitHub Release on SLSA provenance succeeding for every component,
    # alongside the existing signing (merge-and-sign) and SBOM (generate-sbom).
    needs: [prepare, merge-and-sign, security-scan, generate-sbom, provenance, build-helm-chart, build-cli-tools, generate-changelog]
    steps:
      - name: Download all artifacts (with retry resilience)
        id: download-artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        continue-on-error: true

      - name: Retry failed artifact downloads
        if: steps.download-artifacts.outcome == 'failure'
        run: |
          echo "Initial download failed, attempting selective downloads..."

          # Try downloading critical artifacts individually
          for artifact in "helm-chart" "changelog" "cli-tools-linux-amd64" "cli-tools-darwin-amd64" "cli-tools-windows-amd64"; do
            echo "Attempting to download $artifact..."
            gh run download ${{ github.run_id }} --name "$artifact" --dir . || echo "Failed to download $artifact"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug artifact structure
        run: |
          echo "=== Artifact structure ==="
          find . -type f -name "*.tgz" -o -name "*.spdx.json" -o -name "vrtg-*" -o -name "vcts-*" -o -name "virtrigaud-loadgen-*" | head -20
          echo "=== Directory structure ==="
          ls -la
          echo "=== SBOM directories ==="
          ls -la sbom-* 2>/dev/null || echo "No sbom-* directories found"

      - name: Create checksums
        run: |
          # Create checksums for all available release artifacts
          FILES=$(find . -type f \( -name "*.tgz" -o -name "*.spdx.json" -o -name "vrtg-*" -o -name "vcts-*" -o -name "virtrigaud-loadgen-*" \) 2>/dev/null | sort)

          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs sha256sum > checksums.txt
            echo "Generated checksums for $(echo "$FILES" | wc -l) files:"
            cat checksums.txt
          else
            echo "Warning: No files found for checksum generation - creating empty checksums.txt"
            touch checksums.txt
          fi

      - name: Prepare release files
        run: |
          # Create a release directory and copy available files
          mkdir -p release-files

          # Copy helm charts
          find . -name "*.tgz" -type f -exec cp {} release-files/ \; 2>/dev/null || echo "No helm charts found"

          # Copy SBOM files
          find . -name "*.spdx.json" -type f -exec cp {} release-files/ \; 2>/dev/null || echo "No SBOM files found"

          # Copy CLI tools
          find . -name "vrtg-*" -type f -exec cp {} release-files/ \; 2>/dev/null || echo "No vrtg tools found"
          find . -name "vcts-*" -type f -exec cp {} release-files/ \; 2>/dev/null || echo "No vcts tools found"
          find . -name "virtrigaud-loadgen-*" -type f -exec cp {} release-files/ \; 2>/dev/null || echo "No loadgen tools found"

          # Copy checksums
          cp checksums.txt release-files/ 2>/dev/null || echo "No checksums file found"

          echo "Release files prepared:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          body_path: changelog/CHANGELOG.md
          files: release-files/*
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          fail_on_unmatched_files: false

  update-helm-repo:
    name: Update Helm Repository
    runs-on: ubuntu-latest
    needs: [prepare, create-release]
    if: github.repository == 'projectbeskar/virtrigaud'
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create gh-pages branch if it doesn't exist
        run: |
          if [ ! -d "gh-pages" ] || [ ! -f "gh-pages/.git/HEAD" ]; then
            echo "Creating gh-pages branch..."
            rm -rf gh-pages
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "# Helm Repository" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push -u origin gh-pages
          fi

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: '3.12.0'

      - name: Download helm chart
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: helm-chart
          path: ./charts

      - name: Update Helm repository
        run: |
          cd gh-pages

          # Ensure we're on gh-pages branch
          git checkout gh-pages 2>/dev/null || git checkout -b gh-pages

          # Copy new chart (preserve docs/ directory if it exists)
          cp ../charts/*.tgz ./

          # Update index
          helm repo index . --url https://projectbeskar.github.io/virtrigaud

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "Release Helm chart ${{ needs.prepare.outputs.tag }} [skip ci]"

            # Set upstream and push
            git push --set-upstream origin gh-pages
          fi
